database:
  path: data/portfolio.duckdb

logging:
  level: INFO
  json_format: false

reporting:
  base_currency: USD
  reporting_currencies: [USD, SEK, ILS, EUR, GBP]

providers:
  fx:
    name: ecb
    options:
      timeout_seconds: 15
      cache_ttl_hours: 12
  price:
    name: yfinance
    options:
      timeout_seconds: 15
      cache_ttl_hours: 12
    # To price assets from a running Interactive Brokers TWS / IB Gateway
    # instead, install the extra (pip install -e ".[ibkr]"), enable the API
    # in TWS, and use:
    #
    # name: ibkr
    # options:
    #   host: 127.0.0.1
    #   port: 7497            # 7497 TWS paper · 7496 TWS live · 4002/4001 Gateway
    #   client_id: 17
    #   timeout_seconds: 15
    #   exchange: SMART       # default routing exchange
    #   currency: USD         # default instrument currency
    #   market_data_type: 3   # 1 live · 2 frozen · 3 delayed · 4 delayed-frozen
    #
    # Symbols may be "TICKER" or "TICKER:EXCHANGE:CURRENCY" (e.g. VOD:LSE:GBP).

web:
  host: 127.0.0.1
  port: 8000
  reload: false

auto_snapshot:
  enabled: true
  stale_after_minutes: 360       # take a fresh snapshot if the latest is older than this
  backfill_benchmarks_on_seed: true
